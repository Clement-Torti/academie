<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Continu — L'Académie</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            frBlue: '#002654',
            frRed: '#ED2939',
            frCream: '#FFFDD0',
            gold: '#D4AF37',
          },
          fontFamily: {
            serif: ['Merriweather', 'Georgia', 'serif'],
            sans: ['Montserrat', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Montserrat', sans-serif; background: #fdfbf7; }
    .word-chip {
      cursor: pointer;
      user-select: none;
      transition: all 0.15s ease;
    }
    .word-chip:active { transform: scale(0.95); }
    .lesson-modal-content { max-height: 75vh; overflow-y: auto; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .correct-flash { animation: correctFlash 0.4s ease; }
    @keyframes correctFlash { 0%,100% { background: transparent; } 50% { background: #d1fae5; } }
    .wrong-flash { animation: wrongFlash 0.4s ease; }
    @keyframes wrongFlash { 0%,100% { background: transparent; } 50% { background: #fee2e2; } }
  </style>
</head>
<body class="min-h-screen">

  <!-- NAV -->
  <nav class="bg-frBlue text-white px-4 py-3 flex items-center gap-3 shadow-md sticky top-0 z-40">
    <a href="index.html" class="text-white/70 hover:text-white transition-colors">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <span class="font-bold text-lg tracking-wide flex-1">Test Continu</span>
    <span id="nav-progress" class="text-sm text-white/70"></span>
  </nav>

  <!-- MAIN -->
  <main class="max-w-2xl mx-auto px-4 py-8 space-y-6" id="main">

    <!-- DASHBOARD (shown before/after series) -->
    <div id="dashboard" class="space-y-6 fade-in">

      <!-- Pending to study -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <h2 class="font-bold text-frBlue text-base mb-3 flex items-center gap-2">
          <i class="fa-solid fa-book-open text-frRed"></i> Lecciones pendientes de estudiar
        </h2>
        <div id="pending-lessons-list" class="text-sm text-gray-500 italic">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Stats per lesson -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <h2 class="font-bold text-frBlue text-base mb-3 flex items-center gap-2">
          <i class="fa-solid fa-chart-bar text-frBlue"></i> Tu progreso por lección
        </h2>
        <div id="stats-list" class="space-y-2 text-sm">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Start button -->
      <button id="start-btn" onclick="app.startSeries()"
        class="w-full bg-frBlue text-white font-bold py-4 rounded-2xl text-lg shadow hover:bg-blue-900 transition-colors">
        Empezar serie de 20 preguntas →
      </button>
    </div>

    <!-- QUESTION AREA (hidden until series starts) -->
    <div id="question-area" class="hidden space-y-4 fade-in">

      <!-- Lesson badge -->
      <div class="flex items-center gap-2">
        <button id="lesson-badge" onclick="app.showLessonModal()"
          class="bg-frBlue/10 text-frBlue text-xs font-bold px-3 py-1.5 rounded-full hover:bg-frBlue/20 transition-colors flex items-center gap-2">
          <i class="fa-solid fa-graduation-cap"></i>
          <span id="lesson-badge-text">Lección —</span>
        </button>
        <button onclick="app.markToStudy()"
          class="text-xs text-gray-400 hover:text-frRed transition-colors flex items-center gap-1 ml-auto"
          title="No sé esta lección, añadirla a pendientes">
          <i class="fa-solid fa-flag"></i> No sé esta lección
        </button>
      </div>

      <!-- Progress bar -->
      <div class="flex items-center gap-3">
        <div class="flex-1 bg-gray-100 rounded-full h-2">
          <div id="q-progress-bar" class="bg-frBlue h-2 rounded-full transition-all duration-500" style="width:0%"></div>
        </div>
        <span id="q-counter" class="text-xs text-gray-400 font-bold whitespace-nowrap">1 / 20</span>
      </div>

      <!-- Question card -->
      <div id="question-card" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-5 fade-in">
        <p id="q-instruction" class="text-xs text-gray-400 uppercase tracking-widest font-semibold"></p>
        <p id="q-prompt" class="text-lg font-serif text-gray-800 leading-relaxed"></p>
        <div id="q-input-area"></div>
      </div>

      <!-- Feedback -->
      <div id="feedback-box" class="hidden rounded-2xl p-4 text-sm font-medium"></div>

      <!-- Next button -->
      <button id="next-btn" onclick="app.nextQuestion()" class="hidden w-full bg-frBlue text-white font-bold py-3 rounded-2xl shadow hover:bg-blue-900 transition-colors">
        Siguiente →
      </button>
    </div>

  </main>

  <!-- LESSON MODAL -->
  <div id="lesson-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="app.closeLessonModal()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl z-10 flex flex-col max-h-[85vh]">
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 shrink-0">
        <h3 id="lesson-modal-title" class="font-bold text-frBlue text-base"></h3>
        <button onclick="app.closeLessonModal()" class="text-gray-400 hover:text-gray-700 transition-colors text-xl"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="lesson-modal-body" class="lesson-modal-content p-5 overflow-y-auto text-gray-800 font-sans leading-relaxed space-y-6"></div>
    </div>
  </div>

  <script>
  // ─────────────────────────────────────────────────────────────────────────────
  // STORAGE KEYS
  // ─────────────────────────────────────────────────────────────────────────────
  const STORAGE_SCORES   = 'tc_scores';    // { [lessonNum]: { done: N, ok: N, history: [{ok},...] } }
  const STORAGE_PENDING  = 'tc_pending';   // [lessonNum, ...]   — logic left empty for now
  const STORAGE_PROGRESS = 'acad_progress'; // from main app

  // ─────────────────────────────────────────────────────────────────────────────
  // HELPERS
  // ─────────────────────────────────────────────────────────────────────────────
  function loadJSON(key, def) {
    try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
  }
  function saveJSON(key, val) {
    localStorage.setItem(key, JSON.stringify(val));
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // APP
  // ─────────────────────────────────────────────────────────────────────────────
  const app = {
    // state
    series: [],          // list of {lessonNum, question} for current 20-q series
    seriesIdx: 0,
    scores: {},          // { [lessonNum]: { done, ok, history:[{ok:bool}] } }
    pending: [],         // lesson numbers to study — logic empty for now
    currentLesson: null, // { num, title, contentHtml }

    // ── INIT ─────────────────────────────────────────────────────────────────
    init() {
      this.scores  = loadJSON(STORAGE_SCORES, {});
      this.pending = loadJSON(STORAGE_PENDING, []);
      this.renderDashboard();
    },

    // ── HIGHEST COMPLETED LESSON (from main app progress) ────────────────────
    getMaxLesson() {
      const progress = loadJSON(STORAGE_PROGRESS, {});
      const keys = Object.keys(progress);
      if (!keys.length) return 1;
      return Math.max(...keys.map(k => parseInt(k) || 0));
    },

    // ── DASHBOARD ─────────────────────────────────────────────────────────────
    renderDashboard() {
      this.renderPending();
      this.renderStats();
    },

    renderPending() {
      const el = document.getElementById('pending-lessons-list');
      // Logic left empty — pending list will be managed later
      if (!this.pending.length) {
        el.innerHTML = '<span class="text-gray-400 italic text-sm">Ninguna lección pendiente.</span>';
      } else {
        // placeholder for future logic
        el.innerHTML = this.pending.map(n =>
          `<div class="flex items-center gap-2 py-1">
             <i class="fa-solid fa-circle-exclamation text-frRed text-xs"></i>
             <a href="lesson${n}.html" target="_blank" class="text-frBlue hover:underline">Lección ${n}</a>
           </div>`
        ).join('');
      }
    },

    renderStats() {
      const el = document.getElementById('stats-list');
      const entries = Object.entries(this.scores).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
      if (!entries.length) {
        el.innerHTML = '<span class="text-gray-400 italic text-sm">Todavía sin datos. ¡Empieza una serie!</span>';
        return;
      }
      el.innerHTML = entries.map(([num, s]) => {
        const pct = s.done ? Math.round((s.ok / s.done) * 100) : 0;
        const barColor = pct >= 80 ? 'bg-green-400' : pct >= 60 ? 'bg-yellow-400' : 'bg-frRed';
        const toStudy = this.pending.includes(parseInt(num));
        return `
          <div class="flex items-center gap-3">
            <span class="w-20 shrink-0 text-frBlue font-semibold">Lección ${num}</span>
            <div class="flex-1 bg-gray-100 rounded-full h-2">
              <div class="${barColor} h-2 rounded-full" style="width:${pct}%"></div>
            </div>
            <span class="text-gray-500 w-16 text-right shrink-0">${s.ok}/${s.done}</span>
            ${toStudy ? '<span class="text-frRed text-xs font-bold shrink-0"><i class="fa-solid fa-flag"></i></span>' : '<span class="w-4 shrink-0"></span>'}
          </div>`;
      }).join('');
    },

    // ── BUILD SERIES ──────────────────────────────────────────────────────────
    async startSeries() {
      const maxLesson = Math.min(this.getMaxLesson(), 90);
      const targetCount = 20;

      document.getElementById('start-btn').textContent = 'Cargando preguntas…';
      document.getElementById('start-btn').disabled = true;

      this.series = await this.buildSeries(maxLesson, targetCount);
      this.seriesIdx = 0;

      if (!this.series.length) {
        alert('No se encontraron preguntas. Asegúrate de haber completado al menos una lección.');
        document.getElementById('start-btn').textContent = 'Empezar serie de 20 preguntas →';
        document.getElementById('start-btn').disabled = false;
        return;
      }

      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('question-area').classList.remove('hidden');
      this.showQuestion();
    },

    async buildSeries(maxLesson, count) {
      // We'll try to pick questions from random lessons
      // Attempt multiple fetches in parallel (up to count*2 tries to get count valid questions)
      const questions = [];
      const ALLOWED_TYPES = ['selection_single', 'true_false', 'sentence_builder'];
      const attempts = new Set();

      while (questions.length < count && attempts.size < count * 3) {
        const lessonNum = Math.floor(Math.random() * maxLesson) + 1;
        const cacheKey = `exercice_cache_${lessonNum}`;

        let exercises = null;
        const cached = sessionStorage.getItem(cacheKey);
        if (cached) {
          try { exercises = JSON.parse(cached); } catch {}
        }

        if (!exercises) {
          try {
            const res = await fetch(`exercices${lessonNum}.html`);
            if (!res.ok) { attempts.add(`${lessonNum}_fail`); continue; }
            const text = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, 'text/html');
            const scriptEl = doc.getElementById('exercise-data');
            if (!scriptEl) { attempts.add(`${lessonNum}_nodata`); continue; }
            const data = JSON.parse(scriptEl.textContent);
            exercises = (data.interactive_exercises || []).filter(q => ALLOWED_TYPES.includes(q.type));
            sessionStorage.setItem(cacheKey, JSON.stringify(exercises));
          } catch {
            attempts.add(`${lessonNum}_err`);
            continue;
          }
        }

        if (!exercises.length) { attempts.add(`${lessonNum}_empty`); continue; }

        // Pick a random question from that lesson that we haven't already queued
        const usedIds = questions.filter(q => q.lessonNum === lessonNum).map(q => q.question.id);
        const available = exercises.filter(q => !usedIds.includes(q.id));
        if (!available.length) { attempts.add(`${lessonNum}_used`); continue; }

        const q = available[Math.floor(Math.random() * available.length)];
        // Fetch lesson title (cached too)
        const title = await this.getLessonTitle(lessonNum);
        questions.push({ lessonNum, question: q, lessonTitle: title });
        attempts.add(`${lessonNum}_${q.id}`);
      }

      return questions;
    },

    // lesson title cache
    _titleCache: {},

    async getLessonTitle(num) {
      if (this._titleCache[num]) return this._titleCache[num];
      try {
        const res = await fetch(`lesson${num}.html`);
        if (!res.ok) return `Lección ${num}`;
        const text = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const scriptEl = doc.getElementById('lesson-data');
        if (!scriptEl) return `Lección ${num}`;
        const data = JSON.parse(scriptEl.textContent);
        const title = data.title || `Lección ${num}`;
        this._titleCache[num] = title;
        return title;
      } catch {
        return `Lección ${num}`;
      }
    },

    // ── SHOW QUESTION ─────────────────────────────────────────────────────────
    showQuestion() {
      const item = this.series[this.seriesIdx];
      if (!item) { this.endSeries(); return; }

      this.currentLesson = { num: item.lessonNum, title: item.lessonTitle };

      // Update badge
      document.getElementById('lesson-badge-text').textContent = item.lessonTitle;

      // Progress bar
      const pct = (this.seriesIdx / this.series.length) * 100;
      document.getElementById('q-progress-bar').style.width = pct + '%';
      document.getElementById('q-counter').textContent = `${this.seriesIdx + 1} / ${this.series.length}`;
      document.getElementById('nav-progress').textContent = `${this.seriesIdx + 1} / ${this.series.length}`;

      // Clear feedback + next btn
      const fb = document.getElementById('feedback-box');
      fb.classList.add('hidden');
      fb.className = 'hidden rounded-2xl p-4 text-sm font-medium';
      document.getElementById('next-btn').classList.add('hidden');

      // Render question
      const q = item.question;
      document.getElementById('q-instruction').textContent = q.instruction || '';
      document.getElementById('q-prompt').textContent = q.prompt || '';

      const inputArea = document.getElementById('q-input-area');
      inputArea.innerHTML = '';

      if (q.type === 'selection_single') {
        this.renderSelectionSingle(q, inputArea);
      } else if (q.type === 'true_false') {
        this.renderTrueFalse(q, inputArea);
      } else if (q.type === 'sentence_builder') {
        this.renderSentenceBuilder(q, inputArea);
      }

      // Animate card
      const card = document.getElementById('question-card');
      card.classList.remove('fade-in');
      void card.offsetWidth;
      card.classList.add('fade-in');
    },

    // ── RENDER: selection_single ──────────────────────────────────────────────
    renderSelectionSingle(q, container) {
      const grid = document.createElement('div');
      grid.className = 'grid grid-cols-1 gap-2';
      q.content.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'w-full text-left px-4 py-3 rounded-xl border-2 border-gray-200 hover:border-frBlue hover:bg-frBlue/5 transition-all font-medium text-gray-700';
        btn.textContent = opt.text;
        btn.dataset.id = opt.id;
        btn.onclick = () => this.checkSelectionSingle(q, opt.id);
        grid.appendChild(btn);
      });
      container.appendChild(grid);
    },

    checkSelectionSingle(q, selectedId) {
      const correct = selectedId === q.content.correct_option_id;
      // Highlight options
      document.querySelectorAll('#q-input-area button').forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.id === q.content.correct_option_id) {
          btn.className = 'w-full text-left px-4 py-3 rounded-xl border-2 border-green-400 bg-green-50 font-medium text-green-800';
        } else if (btn.dataset.id === selectedId && !correct) {
          btn.className = 'w-full text-left px-4 py-3 rounded-xl border-2 border-frRed bg-red-50 font-medium text-red-700';
        }
      });
      this.showFeedback(q, correct);
      this.recordAnswer(correct);
    },

    // ── RENDER: true_false ────────────────────────────────────────────────────
    renderTrueFalse(q, container) {
      const wrap = document.createElement('div');
      wrap.className = 'flex gap-3';
      ['true', 'false'].forEach(val => {
        const btn = document.createElement('button');
        btn.className = 'flex-1 py-3 rounded-xl border-2 border-gray-200 hover:border-frBlue hover:bg-frBlue/5 font-bold text-gray-700 transition-all';
        btn.textContent = val === 'true' ? 'Vrai ✓' : 'Faux ✗';
        btn.dataset.val = val;
        btn.onclick = () => this.checkTrueFalse(q, val === 'true');
        wrap.appendChild(btn);
      });
      container.appendChild(wrap);
    },

    checkTrueFalse(q, selected) {
      const correct = selected === q.content.is_correct;
      document.querySelectorAll('#q-input-area button').forEach(btn => {
        btn.disabled = true;
        const isCorrectBtn = (btn.dataset.val === 'true') === q.content.is_correct;
        if (isCorrectBtn) {
          btn.className = 'flex-1 py-3 rounded-xl border-2 border-green-400 bg-green-50 font-bold text-green-800';
        } else if (!correct && (btn.dataset.val === 'true') === selected) {
          btn.className = 'flex-1 py-3 rounded-xl border-2 border-frRed bg-red-50 font-bold text-red-700';
        }
      });
      // Show explanation
      const extraFeedback = q.content.explanation
        ? `<p class="mt-2 text-xs opacity-80">${q.content.explanation}</p>` : '';
      this.showFeedback(q, correct, extraFeedback);
      this.recordAnswer(correct);
    },

    // ── RENDER: sentence_builder ──────────────────────────────────────────────
    renderSentenceBuilder(q, container) {
      const c = q.content;
      container.dataset.correctOrder = JSON.stringify(c.correct_order);
      container.dataset.selected = JSON.stringify([]);

      // Answer zone
      const answerZone = document.createElement('div');
      answerZone.id = 'sb-answer';
      answerZone.className = 'min-h-[48px] bg-frBlue/5 border-2 border-dashed border-frBlue/30 rounded-xl px-3 py-2 flex flex-wrap gap-2 mb-4';
      answerZone.innerHTML = '<span class="text-gray-400 text-sm italic self-center" id="sb-placeholder">Haz clic en las palabras para ordenarlas…</span>';
      container.appendChild(answerZone);

      // Word bank
      const bank = document.createElement('div');
      bank.id = 'sb-bank';
      bank.className = 'flex flex-wrap gap-2';

      // Shuffle segments
      const shuffled = [...c.segments].sort(() => Math.random() - 0.5);
      shuffled.forEach(word => {
        const chip = this.makeSbChip(word, false);
        bank.appendChild(chip);
      });
      container.appendChild(bank);

      // Validate button
      const validateBtn = document.createElement('button');
      validateBtn.id = 'sb-validate';
      validateBtn.className = 'mt-4 w-full bg-frBlue text-white font-bold py-3 rounded-xl hover:bg-blue-900 transition-colors';
      validateBtn.textContent = 'Validar';
      validateBtn.onclick = () => this.checkSentenceBuilder(q);
      container.appendChild(validateBtn);
    },

    makeSbChip(word, inAnswer) {
      const chip = document.createElement('button');
      chip.className = `word-chip px-3 py-1.5 rounded-lg font-semibold text-sm border-2 ${inAnswer ? 'bg-frBlue text-white border-frBlue' : 'bg-white text-frBlue border-frBlue/50 hover:border-frBlue hover:bg-frBlue/10'}`;
      chip.textContent = word;
      chip.dataset.word = word;
      chip.onclick = () => this.sbChipClick(chip, inAnswer);
      return chip;
    },

    sbChipClick(chip, inAnswer) {
      const answerZone = document.getElementById('sb-answer');
      const bank = document.getElementById('sb-bank');
      const placeholder = document.getElementById('sb-placeholder');

      if (inAnswer) {
        // Move back to bank
        chip.remove();
        const newChip = this.makeSbChip(chip.dataset.word, false);
        bank.appendChild(newChip);
        if (!answerZone.querySelector('button')) {
          placeholder.style.display = '';
        }
      } else {
        // Move to answer
        chip.remove();
        placeholder.style.display = 'none';
        const newChip = this.makeSbChip(chip.dataset.word, true);
        answerZone.appendChild(newChip);
      }
    },

    checkSentenceBuilder(q) {
      const answerZone = document.getElementById('sb-answer');
      const selectedWords = Array.from(answerZone.querySelectorAll('button')).map(b => b.dataset.word);
      const correct = JSON.stringify(selectedWords) === JSON.stringify(q.content.correct_order);

      // Disable all chips
      document.querySelectorAll('#q-input-area .word-chip').forEach(c => c.disabled = true);
      document.getElementById('sb-validate').disabled = true;

      // Color answer zone
      answerZone.className = `min-h-[48px] border-2 rounded-xl px-3 py-2 flex flex-wrap gap-2 mb-4 ${correct ? 'bg-green-50 border-green-400' : 'bg-red-50 border-frRed'}`;

      if (!correct) {
        // Show correct answer
        const correctDiv = document.createElement('div');
        correctDiv.className = 'mt-2 text-sm text-gray-600';
        correctDiv.innerHTML = `<span class="font-semibold text-green-700">Respuesta correcta:</span> ${q.content.correct_order.join(' ')}`;
        document.getElementById('q-input-area').appendChild(correctDiv);
      }

      this.showFeedback(q, correct);
      this.recordAnswer(correct);
    },

    // ── FEEDBACK ──────────────────────────────────────────────────────────────
    showFeedback(q, correct, extraHtml = '') {
      const fb = document.getElementById('feedback-box');
      if (correct) {
        fb.className = 'rounded-2xl p-4 text-sm font-medium bg-green-50 border border-green-200 text-green-800';
        fb.innerHTML = `<i class="fa-solid fa-circle-check mr-2"></i>${q.feedback?.correct || '¡Correcto!'} ${extraHtml}`;
      } else {
        fb.className = 'rounded-2xl p-4 text-sm font-medium bg-red-50 border border-red-200 text-red-700';
        fb.innerHTML = `<i class="fa-solid fa-circle-xmark mr-2"></i>${q.feedback?.incorrect || 'Incorrecto.'} ${extraHtml}`;
      }
      fb.classList.remove('hidden');
      document.getElementById('next-btn').classList.remove('hidden');
    },

    // ── SCORE TRACKING ────────────────────────────────────────────────────────
    recordAnswer(correct) {
      const num = this.currentLesson.num;
      if (!this.scores[num]) this.scores[num] = { done: 0, ok: 0, history: [] };
      const s = this.scores[num];
      s.done++;
      if (correct) s.ok++;
      s.history.push({ ok: correct });

      // Every 5 questions for this lesson: check success rate of last 5
      if (s.history.length % 5 === 0) {
        const last5 = s.history.slice(-5);
        const successes = last5.filter(h => h.ok).length;
        if (successes < 3) {
          // Mark as to study — logic to be implemented
          // this.addToPending(num);
        }
      }

      saveJSON(STORAGE_SCORES, this.scores);
    },

    // Placeholder — pending lesson logic left empty
    addToPending(num) {
      // TODO: implement pending lesson logic
    },

    markToStudy() {
      // TODO: implement pending lesson logic
      // const num = this.currentLesson?.num;
      // if (num && !this.pending.includes(num)) { ... }
    },

    // ── NEXT QUESTION ─────────────────────────────────────────────────────────
    nextQuestion() {
      this.seriesIdx++;
      if (this.seriesIdx >= this.series.length) {
        this.endSeries();
      } else {
        this.showQuestion();
      }
    },

    // ── END SERIES ────────────────────────────────────────────────────────────
    endSeries() {
      document.getElementById('question-area').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('dashboard').classList.add('fade-in');
      document.getElementById('nav-progress').textContent = '';
      document.getElementById('start-btn').textContent = 'Nueva serie de 20 preguntas →';
      document.getElementById('start-btn').disabled = false;
      this.renderDashboard();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    // ── LESSON MODAL ──────────────────────────────────────────────────────────
    async showLessonModal() {
      const num = this.currentLesson?.num;
      if (!num) return;

      const modal = document.getElementById('lesson-modal');
      const title = document.getElementById('lesson-modal-title');
      const body = document.getElementById('lesson-modal-body');

      title.textContent = this.currentLesson.title;
      body.innerHTML = '<div class="text-center py-8 text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>';
      modal.classList.remove('hidden');

      try {
        const res = await fetch(`lesson${num}.html`);
        const text = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const content = doc.getElementById('lesson-content');
        if (content) {
          body.innerHTML = content.innerHTML;
          // Make details elements functional (they are by default in HTML5)
        } else {
          body.innerHTML = '<p class="text-gray-500 italic">Contenido no disponible.</p>';
        }
      } catch {
        body.innerHTML = '<p class="text-red-500">Error cargando la lección.</p>';
      }
    },

    closeLessonModal() {
      document.getElementById('lesson-modal').classList.add('hidden');
    },
  };

  app.init();
  </script>
</body>
</html>
