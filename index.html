<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'Académie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Montserrat:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="icon" type="image/x-icon" href="academie.png">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Merriweather', 'serif'] },
                    colors: {
                        frBlue: '#002654',
                        frRed: '#ED2939',
                        frCream: '#F5F5DC',
                        gold: '#D4AF37',
                        bronze: '#CD7F32',
                        silver: '#C0C0C0'
                    },
                    boxShadow: { 'card': '0 10px 15px -3px rgba(0, 0, 0, 0.1)', 'btn': '0px 4px 0px 0px rgba(0,0,0,0.3)' }
                }
            }
        }
    </script>

    <style>
        body {
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #002654;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }

        /* Styles for Content */
        .lesson-step h2 {
            color: #002654;
            font-weight: 700;
            margin-bottom: 0.5em;
            font-size: 1.25em;
            font-family: 'Merriweather', serif;
        }

        .lesson-step p {
            margin-bottom: 1em;
            line-height: 1.6;
            color: #374151;
            font-size: 1rem;
        }

        .lesson-step ul {
            list-style-type: disc;
            padding-left: 1.2em;
            margin-bottom: 1em;
        }

        .lesson-step strong {
            color: #ED2939;
            font-weight: 700;
        }

        textarea,
        input {
            font-size: 16px !important;
        }

        /* Modal Animation */
        .modal-enter {
            opacity: 0;
            transform: scale(0.95);
        }

        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: all 0.2s ease-out;
        }

        /* --- CONJUGAISON CHALLENGE STYLES --- */
        .conj-card {
            background: #eff6ff;
            border: 2px solid #dbeafe;
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            /* Prevent it from being too wide on desktop */
            width: 100%;
        }

        .conj-card.is-negative {
            background: #fef2f2;
            border-color: #fecaca;
        }

        .tense-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #2563eb;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .tense-badge:hover {
            transform: scale(1.05);
            background: #1d4ed8;
        }

        .neg-badge {
            background: #dc2626;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: none;
            animation: pulse 1.5s infinite;
        }

        .verb-source {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #1e3a8a;
            margin: 10px 0;
        }

        .correct-answer {
            font-size: 1.5rem;
            color: #059669;
            font-weight: bold;
            padding: 1rem;
            border: 2px dashed #059669;
            border-radius: 12px;
            background: #ecfdf5;
            margin-top: 1rem;
            animation: slideIn 0.3s ease-out forwards;
        }

        /* Help Modal Styles */
        .cj-modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .cj-rule-box {
            background: #f0f9ff;
            padding: 10px;
            border-left: 4px solid #2563eb;
            margin: 10px 0;
            text-align: left;
            font-size: 0.9rem;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes pulse-gold {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-pulse-gold {
            animation: pulse-gold 2s infinite;
        }

        /* Emily Chat Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out;
        }

        #emily-messages::-webkit-scrollbar {
            width: 6px;
        }

        #emily-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        #emily-messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        #emily-messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Correction display inside user bubble */
        .correction-block {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 0.72rem;
            line-height: 1.4;
        }

        .correction-block del {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .correction-block .correction-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 3px;
            margin-bottom: 2px;
        }

        .correction-block .corr-arrow {
            opacity: 0.8;
        }

        .correction-block .corr-fix {
            font-weight: 700;
            background: rgba(255,255,255,0.25);
            border-radius: 3px;
            padding: 0 3px;
        }

        @keyframes correctPulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .correction-checking {
            animation: correctPulse 1s infinite;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 h-[100dvh] flex flex-col overflow-hidden">

    <!-- NAVBAR -->
    <nav class="bg-frBlue text-white shadow-lg z-50 relative shrink-0">
        <div class="max-w-5xl mx-auto px-4 h-14 flex justify-between items-center">

            <div class="flex items-center gap-4">
                <!-- Logo / Home -->
                <div class="flex items-center gap-2 cursor-pointer active:opacity-70 transition"
                    onclick="app.renderMap()">
                    <i class="fa-solid fa-landmark text-gold text-xl"></i>
                    <h1 class="font-bold text-base tracking-wider uppercase hidden sm:block">L'Académie</h1>
                </div>

                <!-- STREAK COUNTER -->
                <div class="flex items-center gap-1.5 bg-white/10 px-3 py-1 rounded-full border border-white/10">
                    <i class="fa-solid fa-fire text-orange-400 text-sm animate-pulse"></i>
                    <span id="streak-display" class="text-xs font-bold text-white font-mono">0 jour</span>
                </div>
            </div>

            <!-- RIGHT BUTTONS -->
            <div class="flex items-center gap-2">
                <!-- New Verbes Button -->
                <button onclick="app.loadFreestyleVerbs()"
                    class="bg-white/10 active:bg-white/20 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-dumbbell text-gold"></i> <span class="hidden sm:inline">Verbes</span>
                </button>

                <!-- Renamed Vocab Button -->
                <button onclick="app.renderFlashcards()"
                    class="bg-white/10 active:bg-white/20 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-gold"></i> <span>Vocab</span>
                </button>

                <!-- Test Continu -->
                <a href="test-continu.html"
                    class="bg-white/10 active:bg-white/20 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-infinity text-gold"></i> <span class="hidden sm:inline">Test</span>
                </a>

                <!-- API Key Settings -->
                <button onclick="app.showApiKeyModal()"
                    class="bg-white/10 active:bg-white/20 text-white w-8 h-8 rounded-lg text-xs transition flex items-center justify-center">
                    <i class="fa-solid fa-key text-gold"></i>
                </button>
            </div>
        </div>

        <div class="h-1 w-full flex">
            <div class="w-1/3 bg-blue-600"></div>
            <div class="w-1/3 bg-white"></div>
            <div class="w-1/3 bg-red-600"></div>
        </div>
    </nav>

    <!-- MODAL OVERLAY -->
    <div id="selection-modal"
        class="fixed inset-0 z-[60] bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4"
        onclick="app.closeModal(event)">
        <!-- Content injected by JS -->
    </div>

    <!-- API KEY MODAL -->
    <div id="api-key-modal" class="fixed inset-0 z-[70] bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4" onclick="if(event.target===this)app.hideApiKeyModal()">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 animate-slide-in">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-frBlue flex items-center gap-2">
                    <i class="fa-solid fa-key text-gold"></i> Clés API Gemini
                </h3>
                <button onclick="app.hideApiKeyModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>
            <p class="text-sm text-gray-500 mb-4">
                Pour discuter avec Emily, ajoute ta clé API Gemini gratuite.
                <a href="https://aistudio.google.com/apikey" target="_blank" class="text-frBlue underline">Obtenir une clé</a>
            </p>
            <div id="api-keys-list" class="space-y-2 mb-4">
                <!-- Keys will be rendered here -->
            </div>
            <div class="flex gap-2">
                <input type="text" id="new-api-key-input" placeholder="AIzaSy..." onkeypress="if(event.key==='Enter')app.addApiKey()"
                    class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-frBlue">
                <button onclick="app.addApiKey()" class="bg-frBlue text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-800 transition">
                    Ajouter
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main id="app-container" class="flex-1 overflow-y-auto relative bg-[#fdfbf7] w-full">
        <div class="h-full flex flex-col items-center justify-center">
            <div class="loader"></div>
            <p class="text-gray-500 mt-2 text-sm">Chargement...</p>
        </div>
    </main>

    <script>

        const conjApp = {
            dataUrl: "https://clement-torti.github.io/academie/verbs.html",
            db: {},
            roundsPlayed: 0,
            maxRounds: 2,
            score: 0,
            bestScore: parseInt(localStorage.getItem('acad_cj_best') || '0'), // Load best score
            timer: 70,
            interval: null,
            currentCard: null,
            tenses: ['present', 'pc', 'imparfait', 'futur_proche', 'futur', 'subjonctif', 'conditionnel', 'imperatif'], 

            pronounsEs: ["Yo", "Tú", "Él", "Nosotros", "Vosotros", "Ellos"],
            pronounsFr: ["Je", "Tu", "Il", "Nous", "Vous", "Ils/Elles"],

            rules: {
                "present": "Action actuelle / vérité générale.<br><div class='cj-rule-box'><strong>Formation :</strong> Radical + terminaisons selon le groupe.<br><table class='cj-table'><thead><tr><th></th><th>1er groupe<br>(-ER)</th><th>2e groupe<br>(-IR)</th><th>3e groupe<br>(modèle -RE)</th></tr></thead><tbody><tr><td>je</td><td>-e</td><td>-is</td><td>-s</td></tr><tr><td>tu</td><td>-es</td><td>-is</td><td>-s</td></tr><tr><td>il / elle</td><td>-e</td><td>-it</td><td>—</td></tr><tr><td>nous</td><td>-ons</td><td>-issons</td><td>-ons</td></tr><tr><td>vous</td><td>-ez</td><td>-issez</td><td>-ez</td></tr><tr><td>ils / elles</td><td>-ent</td><td>-issent</td><td>-ent</td></tr></tbody></table><strong>Négation :</strong> Je <em>ne</em> parle <em>pas</em>.</div>",
                "pc": "Passé terminé / actions ponctuelles.<br><div class='cj-rule-box'><strong>Formation :</strong> Auxiliaire présent + participe passé.<br><table class='cj-table'><thead><tr><th></th><th>Avoir (présent)</th><th>Être (présent)</th><th>Participe passé<br>1er / 2e / 3e groupe</th></tr></thead><tbody><tr><td>je</td><td>ai</td><td>suis</td><td>-é / -i / -u</td></tr><tr><td>tu</td><td>as</td><td>es</td><td>-é / -i / -u</td></tr><tr><td>il</td><td>a</td><td>est</td><td>-é / -i / -u</td></tr><tr><td>nous</td><td>avons</td><td>sommes</td><td>-é / -i / -u</td></tr><tr><td>vous</td><td>avez</td><td>êtes</td><td>-é / -i / -u</td></tr><tr><td>ils</td><td>ont</td><td>sont</td><td>-é / -i / -u</td></tr></tbody></table><strong>Négation :</strong> Je <em>n'</em>ai <em>pas</em> mangé.</div>",
                "imparfait": "Description / habitude / action longue au passé.<br><div class='cj-rule-box'><strong>Formation :</strong> Radical = nous (présent) – ons + terminaisons.<br><table class='cj-table'><thead><tr><th></th><th>Terminaison (tous groupes)</th></tr></thead><tbody><tr><td>je</td><td>-ais</td></tr><tr><td>tu</td><td>-ais</td></tr><tr><td>il / elle</td><td>-ait</td></tr><tr><td>nous</td><td>-ions</td></tr><tr><td>vous</td><td>-iez</td></tr><tr><td>ils / elles</td><td>-aient</td></tr></tbody></table><strong>Négation :</strong> Je <em>ne</em> mangeais <em>pas</em>.</div>",
                "futur": "Projet ou certitude dans l'avenir.<br><div class='cj-rule-box'><strong>Formation :</strong> Infinitif (ou radical irrégulier) + terminaisons.<br><table class='cj-table'><thead><tr><th></th><th>Terminaison (tous groupes)</th></tr></thead><tbody><tr><td>je</td><td>-ai</td></tr><tr><td>tu</td><td>-as</td></tr><tr><td>il / elle</td><td>-a</td></tr><tr><td>nous</td><td>-ons</td></tr><tr><td>vous</td><td>-ez</td></tr><tr><td>ils / elles</td><td>-ont</td></tr></tbody></table><strong>Négation :</strong> Je <em>ne</em> partirai <em>pas</em>.</div>",
                "imperatif": "Ordre ou conseil.<br><div class='cj-rule-box'><strong>Formation :</strong> 3 formes : tu / nous / vous. Terminaisons proches du présent.<br><table class='cj-table'><thead><tr><th></th><th>1er groupe</th><th>2e groupe</th><th>3e groupe</th></tr></thead><tbody><tr><td>tu</td><td>-e</td><td>-is</td><td>-s</td></tr><tr><td>nous</td><td>-ons</td><td>-issons</td><td>-ons</td></tr><tr><td>vous</td><td>-ez</td><td>-issez</td><td>-ez</td></tr></tbody></table><strong>Négation :</strong> <em>Ne</em> parle <em>pas</em> !</div>",
                "conditionnel": "Politesse / hypothèse / souhait.<br><div class='cj-rule-box'><strong>Formation :</strong> Infinitif (ou radical irrégulier) + terminaisons de l’imparfait.<br><table class='cj-table'><thead><tr><th></th><th>Terminaisons (tous groupes)</th></tr></thead><tbody><tr><td>je</td><td>-ais</td></tr><tr><td>tu</td><td>-ais</td></tr><tr><td>il / elle</td><td>-ait</td></tr><tr><td>nous</td><td>-ions</td></tr><tr><td>vous</td><td>-iez</td></tr><tr><td>ils / elles</td><td>-aient</td></tr></tbody></table><strong>Négation :</strong> Je <em>ne</em> voudrais <em>pas</em>.</div>",
                "subjonctif": "Souhait / obligation / doute / émotion.<br><div class='cj-rule-box'><strong>Formation :</strong> Radical = ils (présent) – ent + terminaisons du subjonctif.<br><table class='cj-table'><thead><tr><th></th><th>Terminaisons (tous groupes)</th></tr></thead><tbody><tr><td>je</td><td>-e</td></tr><tr><td>tu</td><td>-es</td></tr><tr><td>il / elle</td><td>-e</td></tr><tr><td>nous</td><td>-ions</td></tr><tr><td>vous</td><td>-iez</td></tr><tr><td>ils / elles</td><td>-ent</td></tr></tbody></table><strong>Négation :</strong> Il faut que tu <em>ne</em> viennes <em>pas</em>.</div>",
                "futur_proche": "Action immédiate ou certitude.<br><div class='cj-rule-box'><strong>Formation :</strong> Aller (présent) + Infinitif.<br><table class='cj-table'><thead><tr><th>Pronom</th><th>Aller</th></tr></thead><tbody><tr><td>je</td><td>vais</td></tr><tr><td>tu</td><td>vas</td></tr><tr><td>il / elle</td><td>va</td></tr><tr><td>nous</td><td>allons</td></tr><tr><td>vous</td><td>allez</td></tr><tr><td>ils / elles</td><td>vont</td></tr></tbody></table><strong>Exemple :</strong> Je <em>vais</em> manger.<br><strong>Négation :</strong> Je <em>ne</em> vais <em>pas</em> manger.</div>",
            },

            async init() {
                window.speechSynthesis.getVoices();
                if (Object.keys(this.db).length === 0) {
                    try {
                        const res = await fetch(this.dataUrl);
                        const text = await res.text();
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(text, 'text/html');
                        this.db = JSON.parse(doc.getElementById('verbs-data').textContent);
                    } catch (e) {
                        console.error("Verbs load failed", e);
                        this.db = { "parler": { "fr": "parler", "present": ["parle", "parles", "parle", "parlons", "parlez", "parlent"], "pc": ["ai parlé", "as parlé", "a parlé", "avons parlé", "avez parlé", "ont parlé"] } };
                    }
                }
                
                // --- AJOUT : Réinitialiser les scores des manches ---
                this.roundsPlayed = 0;
                this.roundScores = []; // Nouveau tableau pour stocker les scores individuels
                
                this.bestScore = parseInt(localStorage.getItem('acad_cj_best') || '0');
                this.renderIntro();
            },

            renderIntro() {
                // Génération de l'HTML pour les 3 boîtes de score
                let roundsHtml = '';
                for(let i = 0; i < this.maxRounds; i++) {
                    const isDone = i < this.roundScores.length;
                    const isCurrent = i === this.roundScores.length;
                    
                    let content, styleClass, titleClass;

                    if (isDone) {
                        // Manche terminée : Afficher le score
                        const scoreVal = this.roundScores[i];
                        const color = scoreVal > 0 ? 'text-green-600' : (scoreVal < 0 ? 'text-red-500' : 'text-gray-400');
                        content = `<span class="text-xl font-bold ${color}">${scoreVal}</span>`;
                        styleClass = "bg-white border-frBlue/20 border-2";
                        titleClass = "text-frBlue";
                    } else if (isCurrent) {
                        // Manche à venir (Actuelle)
                        content = `<i class="fa-solid fa-hourglass-start text-xl text-gold animate-pulse"></i>`;
                        styleClass = "bg-white border-gold border-2 shadow-md scale-105 z-10";
                        titleClass = "text-gold font-bold";
                    } else {
                        // Manche future
                        content = `<span class="text-2xl text-gray-200 font-bold">?</span>`;
                        styleClass = "bg-gray-50 border-gray-100 border";
                        titleClass = "text-gray-300";
                    }

                    roundsHtml += `
                        <div class="flex flex-col items-center justify-center w-20 h-24 rounded-xl transition-all ${styleClass}">
                            <div class="text-[10px] uppercase tracking-widest mb-1 ${titleClass}">Série ${i + 1}</div>
                            <div>${content}</div>
                        </div>
                    `;
                }

                app.container.innerHTML = `
            <div class="h-full flex flex-col items-center justify-center p-6 bg-frCream text-center">
                <div class="mb-4 animate-bounce">
                    <i class="fa-solid fa-dumbbell text-5xl text-frBlue"></i>
                </div>
                <h2 class="text-2xl font-serif font-bold text-frBlue mb-1">Défi Conjugaison</h2>
                <p class="text-gray-500 mb-6 text-sm">Complétez ${this.maxRounds} séries de 60s.</p>
                
                <!-- Best Score Display -->
                <div class="mb-8 flex items-center justify-center gap-2 text-gold font-bold bg-white px-4 py-2 rounded-full shadow-sm border border-orange-100">
                    <i class="fa-solid fa-trophy"></i> Record : ${this.bestScore}
                </div>

                <!-- NEW: SCOREBOARD DISPLAY -->
                <div class="flex justify-center gap-3 mb-8 w-full">
                    ${roundsHtml}
                </div>

                <button onclick="conjApp.startRound()" class="w-full max-w-xs bg-frBlue text-white font-bold py-4 rounded-xl shadow-btn active:translate-y-1 transition hover:bg-blue-900">
                    ${this.roundsPlayed === 0 ? 'Commencer' : 'Série Suivante'} <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
        `;
            },

            startRound() {
                this.score = 0;
                this.timer = 60;
                this.renderGame();
                this.nextCard();

                if (this.interval) clearInterval(this.interval);
                this.interval = setInterval(() => {
                    this.timer--;
                    const el = document.getElementById('cj-timer');
                    if (el) el.innerText = this.timer + 's';

                    if (this.timer <= 0) {
                        clearInterval(this.interval);
                        this.endRound();
                    }
                }, 1000);
            },

            renderGame() {
                // Updated Layout: Centered max-width container

            // --- NEW METHOD: Handle Success/Fail logic ---
            handleResult(isSuccess) {
                if (isSuccess) {
                    this.score++;
                } else {
                    this.score--; 
                    this.triggerFailEffect();
                }
                
                // Update score UI
                const scoreEl = document.getElementById('cj-score');
                if(scoreEl) scoreEl.innerText = this.score;

                // Move to next
                this.nextCard();
            },

            // --- NEW METHOD: Buzzer and Red Flash ---
            triggerFailEffect() {
                // 1. BUZZER SYNTHÉTIQUE (Plus fiable qu'un fichier mp3)
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) {
                        const ctx = new AudioContext();
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();

                        // Type de son : dent de scie (sonne comme un buzzer agressif)
                        osc.type = 'sawtooth'; 
                        
                        // Fréquence basse (150Hz) qui descend
                        osc.frequency.setValueAtTime(150, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);

                        // Volume qui diminue rapidement
                        gain.gain.setValueAtTime(0.5, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);

                        // Connexion
                        osc.connect(gain);
                        gain.connect(ctx.destination);

                        // Jouer pendant 0.3 secondes
                        osc.start();
                        osc.stop(ctx.currentTime + 0.3);
                    }
                } catch (e) {
                    console.error("Audio context error", e);
                }

                // 2. FLASH ROUGE (Visuel)
                const overlay = document.createElement('div');
                overlay.style.position = 'fixed';
                overlay.style.inset = '0';
                overlay.style.backgroundColor = 'rgba(220, 38, 38, 0.5)'; // Rouge semi-transparent
                overlay.style.zIndex = '9999';
                overlay.style.pointerEvents = 'none'; // Permet de cliquer à travers si besoin
                overlay.style.transition = 'opacity 0.7s ease-out';
                
                document.body.appendChild(overlay);

                // Animation de disparition
                requestAnimationFrame(() => {
                    // Forcer le rendu
                    overlay.getBoundingClientRect(); 
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.remove();
                    }, 300);
                });
            },

            endRound() {

                // CHECK HIGH SCORE
                if (this.score > this.bestScore) {

            getConjugation(key, tense, pIdx, isNeg) {
                const data = this.db[key];
                const startsVowel = w => ['a', 'e', 'i', 'o', 'u', 'y', 'é', 'ê', 'h'].includes(w.charAt(0).toLowerCase());
                let conj = "";
                let raw = "";

                // Lógica de obtención del verbo crudo
                if (tense === 'futur_proche') {
                    const aller = ["vais", "vas", "va", "allons", "allez", "vont"];
                    const aux = aller[pIdx];
                    const infinitif = data.fr;
                    if (isNeg) {
                        const ne = startsVowel(aux) ? "n'" : "ne ";
                        return `${ne}${aux} pas ${infinitif}`; // Return directo para futur proche neg
                    } else {
                        return `${aux} ${infinitif}`;
                    }
                } else if (tense === 'pc') {
                    raw = data.pc[pIdx];
                } else if (tense === 'imperatif') {
                    raw = data.imperatif[pIdx];
                } else {
                    raw = data[tense][pIdx];
                }

                // Lógica de construcción (Negación y Pronombres)
                if (tense === 'pc') {
                    const [aux, ...rest] = raw.split(' ');
                    const pp = rest.join(' ');
                    if (isNeg) {
                        const ne = startsVowel(aux) ? "n'" : "ne ";
                        conj = `${ne}${aux} pas ${pp}`;
                    } else conj = raw;
                } else if (tense === 'imperatif') {
                    if (isNeg) {
                        const ne = startsVowel(raw) ? "N'" : "Ne ";
                        conj = `${ne}${raw.toLowerCase()} pas !`;
                    } else conj = raw + " !";
                } else {
                    if (isNeg) {
                        const ne = startsVowel(raw) ? "n'" : "ne ";
                        conj = `${ne}${raw} pas`;
                    } else conj = raw;
                }

                return conj; // Devuelve solo la parte verbal conjugada
            },

           renderTable(key, tense, isNeg, targetIdx, hideTarget) {
                let html = '<table class="w-full border-collapse">';
                const validImp = [1, 3, 4]; // Tu, Nous, Vous
                
                for(let i=0; i<6; i++) {
                    if(tense === 'imperatif' && !validImp.includes(i)) continue;
                    
                    // French Construction
                    const verbForm = this.getConjugation(key, tense, i, isNeg);
                    const pron = tense === 'imperatif' ? '' : this.pronounsFr[i].split('/')[0];
                    const pronDisplay = tense === 'imperatif' ? (i===1 ? '(Tu)' : (i===3 ? '(Nous)' : '(Vous)')) : pron;
                    const startsVowel = ['a', 'e', 'i', 'o', 'u', 'y', 'é'].includes(verbForm.charAt(0).toLowerCase());
                    const isElision = tense !== 'imperatif' && !isNeg && i === 0 && startsVowel;

                    // Spanish Construction
                    const verbEs = this.getSpanishConjugation(key, tense, i, isNeg);
                    const pronEs = this.pronounsEs[i];
                    let fullEs = "";
                    if (tense === 'imperatif') fullEs = verbEs; // Simplified for table
                    else fullEs = isNeg ? `${pronEs} ${verbEs}` : `${pronEs} ${verbEs}`;

                    let content = '';
                    if (hideTarget && i === targetIdx) {
                        const prefix = isElision ? "J'" : pronDisplay;
                        const space = isElision ? "" : " "; 
                        content = `
                        <div class="flex flex-col">
                            <div>
                                <span class="text-gray-500 font-bold">${prefix}</span>${space}<span class="text-frRed font-bold bg-red-50 px-2 py-0.5 rounded border border-red-200 tracking-widest">________</span>
                            </div>
                            <div class="text-[10px] text-gray-400 italic mt-0.5">${fullEs}</div>
                        </div>`;
                    } else {
                        if(isElision) {
                            content = `
                            <div class="flex flex-col">
                                <div><span class="text-gray-400">J'</span><span class="font-bold text-frBlue">${verbForm}</span></div>
                                <div class="text-[10px] text-gray-400 italic mt-0.5">${fullEs}</div>
                            </div>`;
                        } else {
                            content = `
                            <div class="flex flex-col">
                                <div><span class="text-gray-400">${pronDisplay}</span> <span class="font-bold text-frBlue">${verbForm}</span></div>
                                <div class="text-[10px] text-gray-400 italic mt-0.5">${fullEs}</div>
                            </div>`;
                        }
                    }

                    html += `<tr class="${i === targetIdx ? 'bg-yellow-50' : ''} border-b border-gray-100 last:border-0"><td class="py-2 px-2">${content}</td></tr>`;
                }
                html += '</table>';
                return html;
            },

            // 1. NEW HELPER FUNCTION
            getSpanishConjugation(key, tense, pIdx, isNeg) {
                // Safely access data
                const data = this.db[key];
                if (!data || !data.es) return "???";
                
                // Helper for "Ir a + infinitivo" (Futur Proche)
                const irA = ["voy a", "vas a", "va a", "vamos a", "vais a", "van a"];
                
                let raw = "";
                
                // Handle special logic for constructed tenses vs stored tenses
                if (tense === 'futur_proche') {
                    // Dynamic construction for Spanish "Futuro Próximo"
                    raw = `${irA[pIdx]} ${key}`; // key is usually the infinitive in the DB
                } else if (tense === 'imperatif') {
                    // Imperative logic (uses 1, 3, 4 mapping from DB)
                    // If the specific pronoun index isn't in the object, return empty (shouldn't happen based on init logic)
                    raw = data.es.imperatif ? (data.es.imperatif[pIdx] || "") : "";
                } else {
                    // Standard tenses (present, pc, etc) stored in array
                    if (data.es[tense] && data.es[tense][pIdx]) {
                        raw = data.es[tense][pIdx];
                    } else {
                        return "---"; // Fallback if data missing
                    }
                }

                // Apply Negation (Spanish is simple: "no" before the verb group)
                // Note: In Spanish, pronouns usually come *before* the "no" (Yo no hablo).
                // This function returns just the verb part mostly, but we combine it below.
                if (isNeg) {
                    return `no ${raw}`;
                }
                return raw;
            },

            async loadNextBatch() {
                if (this.isFetching || !this.hasMoreLessons) return;

                this.isFetching = true;
                const loader = document.getElementById('scroll-loader');
                if (loader) loader.classList.remove('hidden');

                const newModules = [];
                let count = 0;

                // Try to fetch 'batchSize' number of lessons
                while (count < this.batchSize && this.hasMoreLessons) {
                    const url = `${this.baseUrl}lesson${this.nextLessonId}.html`;
                    try {
                        const res = await fetch(url);
                        if (res.ok) {
                            const text = await res.text();
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(text, 'text/html');
                            const jsonScript = doc.getElementById('lesson-data');

                            if (jsonScript) {
                                const data = JSON.parse(jsonScript.textContent);

                                // 1. Theory Node
                                newModules.push({
                                    id: this.nextLessonId,
                                    uid: `${this.nextLessonId}_theory`,
                                    type: 'theory',
                                    url: url,
                                    title: `Leçon ${this.nextLessonId}`,
                                    topic: data.title,
                                    desc: data.desc,
                                    icon: data.icon
                                });

                                // 2. Practice Node
                                newModules.push({
                                    id: this.nextLessonId,
                                    uid: `${this.nextLessonId}_practice`,
                                    type: 'practice',
                                    url: url,
                                    title: `Exercice ${this.nextLessonId}`,
                                    topic: "Practica",
                                    desc: "",
                                    icon: 'fa-dumbbell'
                                });
                            }
                            this.nextLessonId++;
                            count++; // We count "lessons" found, though we push 2 modules per lesson
                        } else {
                            this.hasMoreLessons = false;
                        }
                    } catch (e) {
                        this.hasMoreLessons = false;
                    }
                }

                if (loader) loader.classList.add('hidden');

                if (newModules.length > 0) {
                    // Append to main list
                    const startIndex = this.modules.length;
                    this.modules = [...this.modules, ...newModules];
                    // Render only the new ones
                    this.appendNodes(newModules, startIndex);
                }

                this.isFetching = false;
            },

            appendNodes(newMods, startIndex) {
                const nodesContainer = document.getElementById('nodes-container');
                if (!nodesContainer) return;

                let nodesHtml = '';

                newMods.forEach((mod, localIndex) => {
                    const globalIndex = startIndex + localIndex;
                    const masteryLevel = this.progress[mod.uid] || 0;

                    // --- 1. HIGH SCORE LOGIC (Score/Max) ---
                    const rawScoreData = this.highScores ? this.highScores[mod.uid] : undefined;
                    let displayScore = '';

                    // Handle new object format {score: x, max: y} vs old number format
                    if (rawScoreData !== undefined) {
                        if (typeof rawScoreData === 'object' && rawScoreData !== null) {
                            displayScore = `${rawScoreData.score}/${rawScoreData.max}`;
                        } else {
                            displayScore = `${rawScoreData}`; // Backwards compatibility
                        }
                    }

                    // --- 2. LOCK LOGIC ---
                    // Currently unlocked. Change to 'true' based on index if you want sequential locking.
                    const isLocked = false;

                    // --- 3. STYLING LOGIC ---
                    const offset = globalIndex % 2 === 0 ? '-translate-x-8 sm:-translate-x-12' : 'translate-x-8 sm:translate-x-12';
                    let colorClass, borderClass, opacityClass, clickAction, iconHtml;

                    if (isLocked) {
                        colorClass = 'bg-gray-200 text-gray-400';
                        borderClass = 'border-gray-300';
                        opacityClass = 'opacity-70 grayscale';
                        clickAction = '';
                        iconHtml = '<i class="fa-solid fa-lock text-sm"></i>';
                    } else {
                        clickAction = mod.type === 'theory' ? `app.loadLesson(${globalIndex})` : `app.loadPractice(${globalIndex})`;
                        opacityClass = '';

                        // Color schemes based on mastery level
                        if (masteryLevel === 0) {
                            if (mod.type === 'theory') {
                                colorClass = 'bg-frBlue text-white';
                                borderClass = 'border-blue-900';
                            } else {
                                colorClass = 'bg-white text-frBlue border-2 border-frBlue';
                                borderClass = 'border-blue-200';
                            }
                            opacityClass = 'scale-110';
                        } else if (masteryLevel === 1) {
                            colorClass = 'bg-bronze text-white';
                            borderClass = 'border-[#8B4513]';
                        } else if (masteryLevel === 2) {
                            colorClass = 'bg-silver text-white';
                            borderClass = 'border-gray-400';
                        } else {
                            colorClass = 'bg-gold text-white';
                            borderClass = 'border-yellow-600';
                        }

                        // Icon selection
                        if (masteryLevel > 0) iconHtml = `<i class="fa-solid ${masteryLevel >= 3 ? 'fa-crown' : 'fa-check'}"></i>`;
                        else iconHtml = `<i class="fa-solid ${mod.icon}"></i>`;
                    }

                    // --- 4. BADGE HTML GENERATION ---
                    // Only show badge for Practice nodes that have a score
                    let scoreBadgeHtml = '';
                    if (mod.type === 'practice' && displayScore !== '') {
                        scoreBadgeHtml = `
                        <div class="absolute -top-2 -right-3 bg-white border border-gray-200 shadow-sm text-[10px] font-bold px-2 py-0.5 rounded-full text-frBlue z-20 flex items-center gap-1 animate-slide-in">
                            <i class="fa-solid fa-star text-gold text-[8px]"></i> ${displayScore}
                        </div>`;
                    }

                    // --- 5. BUILD NODE HTML ---
                    nodesHtml += `
            <div class="flex flex-col items-center mb-16 relative z-10 pointer-events-none w-full animate-slide-in">
                <div class="pointer-events-auto flex flex-col items-center transition-all duration-300 ${offset} ${opacityClass}" id="node-${globalIndex}">
                    <button onclick="${clickAction}" 
                        class="relative w-16 h-16 sm:w-20 sm:h-20 rounded-full text-2xl flex items-center justify-center border-b-4 shadow-xl active:scale-95 transition-all active:translate-y-1 ${colorClass} ${borderClass}">
                        
                        <!-- SCORE BADGE -->
                        ${scoreBadgeHtml}

                        <!-- MAIN ICON -->
                        ${iconHtml}
                        
                        <!-- MASTERY DOTS (If level 1 or 2) -->
                        ${!isLocked && masteryLevel > 0 && masteryLevel < 3 ? `<div class="absolute -bottom-2 flex gap-0.5">${Array(masteryLevel).fill('<div class="w-1.5 h-1.5 rounded-full bg-frBlue border border-white"></div>').join('')}</div>` : ''}
                    </button>
                    
                    <div class="mt-2 text-center w-full">
                        <div class="inline-block mb-2 bg-white/90 backdrop-blur px-3 py-1 rounded-full shadow-sm text-[10px] font-bold text-gray-600 border border-gray-100 uppercase tracking-widest max-w-[16rem] sm:max-w-[18rem] whitespace-normal break-words leading-tight">
                            ${mod.topic}
                        </div>
                    </div>
                </div>
            </div>`;
                });

                nodesContainer.insertAdjacentHTML('beforeend', nodesHtml);

                // Redraw SVG path to connect new nodes
                setTimeout(() => this.drawMapPath(), 100);
            },

            // --- 1. DISCOVERY ---
            async discoverModules() {
                this.modules = []; // Reset
                let id = 1;
                let searching = true;
                while (searching) {
                    const url = `${this.baseUrl}lesson${id}.html`;
                    try {
                        const res = await fetch(url);
                        if (res.ok) {
                            const text = await res.text();
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(text, 'text/html');
                            const jsonScript = doc.getElementById('lesson-data');

                            if (jsonScript) {
                                const data = JSON.parse(jsonScript.textContent);

                                // PUSH 1: THEORY NODE
                                this.modules.push({
                                    id: id,
                                    uid: `${id}_theory`, // Unique ID for progress
                                    type: 'theory',
                                    url: url,
                                    title: `Leçon ${id}`,
                                    topic: data.title,
                                    desc: data.desc,
                                    icon: data.icon
                                });

                                // PUSH 2: PRACTICE NODE
                                this.modules.push({
                                    id: id,
                                    uid: `${id}_practice`, // Unique ID for progress
                                    type: 'practice',
                                    url: url, // We pass lesson URL, loadPractice handles the rest
                                    title: `Exercice ${id}`,
                                    topic: "Practica",
                                    desc: "",
                                    icon: 'fa-dumbbell'
                                });
                            }
                            id++;
                        } else { searching = false; }
                    } catch (e) { searching = false; }
                }

                if (this.modules.length === 0) this.container.innerHTML = `<div class="p-10 text-center">No lessons found.</div>`;
                else this.renderMap();
            },

            drawMapPath() {
                const path = document.getElementById('map-path');
                if (!path || this.modules.length < 2) return;
                const contRect = this.container.getBoundingClientRect();
                let d = '';
                for (let i = 0; i < this.modules.length - 1; i++) {
                    const currEl = document.getElementById(`node-${i}`);
                    const nextEl = document.getElementById(`node-${i + 1}`);
                    if (!currEl || !nextEl) continue;
                    const curr = currEl.getBoundingClientRect();
                    const next = nextEl.getBoundingClientRect();
                    const x1 = curr.left + curr.width / 2;
                    const y1 = curr.top + curr.height / 2 - contRect.top + this.container.scrollTop;
                    const x2 = next.left + next.width / 2;
                    const y2 = next.top + next.height / 2 - contRect.top + this.container.scrollTop;
                    if (i === 0) d += `M ${x1} ${y1} `;
                    d += `C ${x1} ${y1 + (y2 - y1) / 2}, ${x2} ${y1 + (y2 - y1) / 2}, ${x2} ${y2} `;
                }
                path.setAttribute('d', d);
            },

            // --- 3A. LESSON ENGINE (Standard) ---
            async loadLesson(index) {
                this.startTime = Date.now();
                const mod = this.modules[index];

                this.lessonSteps = [];

                // 1. LOAD PREVIOUS LESSON (Rappel)
                if (index > 0) {
                    try {
                        const previousLessonRes = await fetch(this.modules[index - 1].url);
                        if (previousLessonRes.ok) {
                            const previousLessonHtml = await previousLessonRes.text();
                            const parser = new DOMParser();
                            const prevDoc = parser.parseFromString(previousLessonHtml, "text/html");
                            const prevSections = prevDoc.querySelectorAll("section");

                            if (prevSections.length >= 2) {
                                this.lessonSteps.push({
                                    type: 'read',
                                    html: `

                                <span class="bg-frBlue text-white px-2 py-1 rounded text-[10px] font-bold uppercase">Rappel</span>

                            ${prevSections[1].innerHTML}`
                                });
                            }
                        }
                    } catch (e) { console.warn("Previous lesson error", e); }
                }

                // 2. LOAD CURRENT LESSON
                try {
                    const res = await fetch(mod.url);
                    const html = await res.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');

                    this.setupDialoguePlayer(doc);

                    const contentDiv = doc.getElementById('lesson-content');
                    let sections = Array.from(contentDiv.querySelectorAll('section'));
                    if (sections.length === 0) sections = [contentDiv];

                    const readSteps = sections.map(s => ({ type: 'read', html: s.innerHTML }));
                    this.lessonSteps.push(...readSteps);

                    const data = JSON.parse(doc.getElementById('lesson-data').textContent);

                    // 2.5. INSERT EMILY CHAT (After Section 3 - Reading Comprehension)
                    // Check if there's a section 3 (index 2 in sections array)
                    if (sections.length >= 3) {
                        const section3 = sections[2];
                        const readingText = section3.textContent || '';

                        // Only add Emily chat if section 3 has substantial content (likely reading comprehension)
                        if (readingText.length > 300) {
                            const emilyChatIndex = (this.currentModIndex === 0) ? 3 : 4;
                            this.lessonSteps.splice(emilyChatIndex, 0, {
                                type: 'emily-chat',
                                readingContext: readingText,
                                html: this.getEmilyChatHTML()
                            });
                        }
                    }

                    // 3. INSERT VOCAB LIST (In the middle, usually index 2 or 3)
                    let insertIndex = (this.currentModIndex === 0) ? 2 : 3;
                    if (data.vocabulary && data.vocabulary.length > 0) {
                        let vocabListHtml = `<div class="grid grid-cols-1 gap-2">`;

                            vocabListHtml += `
                    <div onclick="app.speakFrench('${safeWord}')"

                                <i class="fa-solid fa-volume-high text-[10px]"></i>
                            </div>
                            <span class="font-bold text-sm text-frBlue">${word.fr}</span>
                        </div>
                        <span class="text-gray-500 text-sm italic">${word.es}</span>
                    </div>`;
                        });
                        vocabListHtml += `</div>`;

                        const vocabSection = {
                            type: "read",
                            html: `
                    <div class="text-center mb-6">
                        <i class="fa-solid fa-book-bookmark text-4xl text-gold mb-2"></i>
                        <h2 class="text-xl font-bold text-frBlue">Vocabulaire</h2>
                    </div>
                    ${vocabListHtml}`
                        };

                        this.lessonSteps.splice(insertIndex, 0, vocabSection);
                    }

                    this.currentLessonMeta = {
                        ...data,
                        id: mod.id,
                        uid: mod.uid,
                        type: 'theory',
                        moduleIndex: index
                    };

                    this.currentStepIdx = 0;
                    this.renderStep();

                } catch (e) {
                    console.error(e);

                }

            // --- REVEAL ANSWER LOGIC (New) ---
            revealAnswer() {
                const ansDisplay = document.getElementById('answer-display');
                const btnReveal = document.getElementById('btn-reveal-local');
                const btnCheck = document.getElementById('btn-check');
                const btnNext = document.getElementById('btn-next');
                const input = document.getElementById('inp-blank');

                // Show answer UI
                if (ansDisplay) ansDisplay.classList.remove('hidden');
                if (btnReveal) btnReveal.classList.add('hidden');
                if (input) {
                    input.disabled = true;
                    input.classList.add('opacity-50');
                }

                // Manage global navigation
                if (btnCheck) btnCheck.classList.add('hidden');
                if (btnNext) btnNext.classList.remove('hidden');
            },

            revealReadingAnswers() {
                // 1. Show all answers
                document.querySelectorAll('.reading-answer').forEach(el => el.classList.remove('hidden'));

                // 2. Hide the local reveal button
                const btnReveal = document.getElementById('btn-reveal-reading');
                if (btnReveal) btnReveal.classList.add('hidden');

                // 3. Swap Global Buttons (Check -> Next)
                const btnCheck = document.getElementById('btn-check');
                const btnNext = document.getElementById('btn-next');
                if (btnCheck) btnCheck.classList.add('hidden');
                if (btnNext) btnNext.classList.remove('hidden');

                // 4. Update Score (Since it's self-assessed/reading, we give points for completing it)
                if (this.currentLessonMeta.type === 'practice') {
                    const scoreDisplay = document.getElementById('score-display');
                    this.currentScore++;
                    // No negative score possible here
                    if (scoreDisplay) {
                        scoreDisplay.innerText = `${this.currentScore} / ${this.currentMaxScore}`;
                        scoreDisplay.classList.add('text-green-600', 'scale-125');
                        setTimeout(() => scoreDisplay.classList.remove('text-green-600', 'scale-125'), 300);
                    }
                }
            },

            // --- INTERACTION HELPERS ---
            selectOption(btn, id) {
                // Remove old selection completely
                document.querySelectorAll('.option-btn').forEach(b => {
                    b.classList.remove('border-frBlue', 'bg-blue-50', 'selected');

            // --- 1. NEW ROBUST AUDIO FUNCTION ---
            currentUtterance: null, // Variable to prevent Chrome Garbage Collection bug

            speakFrench(text) {
                if (!text) return;

                // Cancel any currently playing audio
                window.speechSynthesis.cancel();

                // Create the utterance
                const utterance = new SpeechSynthesisUtterance(text);

                // 1. VOICE SELECTION: Chrome on Mac works best if we explicitly pick "Google Français" or "Thomas"
                const allVoices = window.speechSynthesis.getVoices();

                // Priority: 1. Google Français (Best quality on Chrome), 2. Thomas (Mac Default), 3. Any 'fr-FR', 4. Any 'fr'
                const preferredVoice = allVoices.find(v => v.name === "Google français") ||
                    allVoices.find(v => v.name === "Thomas") ||
                    allVoices.find(v => v.lang === "fr-FR") ||
                    allVoices.find(v => v.lang.startsWith("fr"));

                if (preferredVoice) {
                    utterance.voice = preferredVoice;
                    utterance.lang = preferredVoice.lang; // Ensure lang matches voice
                } else {
                    utterance.lang = 'fr-FR'; // Fallback
                }

                // 2. SETTINGS
                utterance.rate = 0.85; // Slightly slower
                utterance.pitch = 1;
                utterance.volume = 1.0; // Force max volume

                // 3. STORE REFERENCE (Critical fix for Chrome)
                // We assign it to 'this.currentUtterance' so the browser doesn't delete it while speaking
                this.currentUtterance = utterance;

                // Cleanup reference when done
                utterance.onend = () => { this.currentUtterance = null; };
                utterance.onerror = (e) => { console.error("Audio error:", e); };

                // 4. SPEAK
                window.speechSynthesis.speak(utterance);
            },

            addApiKey() {

            removeApiKey(index) {
                const keys = this.getGeminiApiKeys();
                keys.splice(index, 1);
                this.saveGeminiApiKeys(keys);
                this.currentApiKeyIndex = 0;
                this.renderApiKeysList();
            },

            // Get current API key
            getCurrentGeminiKey() {
                const keys = this.getGeminiApiKeys();
                if (keys.length === 0) return null;
                return keys[this.currentApiKeyIndex % keys.length];
            },

            // Try next API key if current one fails
            rotateApiKey() {
                const keys = this.getGeminiApiKeys();
                if (keys.length === 0) return null;
                this.currentApiKeyIndex = (this.currentApiKeyIndex + 1) % keys.length;
                console.log(`Rotated to API key ${this.currentApiKeyIndex + 1}/${keys.length}`);
                return this.getCurrentGeminiKey();
            },

            // Make Gemini API call with automatic key rotation on rate limit
            async callGeminiAPI(contextPrompt, conversationHistory = []) {
                const keys = this.getGeminiApiKeys();
                if (keys.length === 0) {
                    throw new Error('NO_API_KEY');
                }
                const maxRetries = keys.length;
                let lastError = null;

                for (let attempt = 0; attempt < maxRetries; attempt++) {
                    try {
                        const apiKey = this.getCurrentGeminiKey();
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [
                                    { role: 'user', parts: [{ text: contextPrompt }] },
                                    ...conversationHistory.map(msg => ({
                                        role: msg.role === 'user' ? 'user' : 'model',
                                        parts: [{ text: msg.content }]
                                    }))
                                ],
                                generationConfig: {
                                    temperature: 0.9,
                                    maxOutputTokens: 150
                                }
                            })
                        });

                        if (response.ok) {
                            const data = await response.json();
                            return data.candidates[0].content.parts[0].text;
                        }

                        // Check if it's a rate limit error (429) or quota exceeded
                        if (response.status === 429 || response.status === 403) {
                            console.warn(`API key ${this.currentApiKeyIndex + 1} rate limited. Trying next key...`);
                            this.rotateApiKey();
                            lastError = new Error(`Rate limit on key ${attempt + 1}`);
                            continue;
                        }

                        throw new Error(`API request failed: ${response.status}`);

                    } catch (error) {
                        lastError = error;
                        if (attempt < maxRetries - 1) {
                            console.warn(`Error with key ${this.currentApiKeyIndex + 1}, trying next...`);
                            this.rotateApiKey();
                        }
                    }
                }

                throw lastError || new Error('All API keys exhausted');
            },

            async sendMessageToEmily() {
                const input = document.getElementById('emily-user-input');
                if (!input) return;

                const userMessage = input.value.trim();
                if (!userMessage) return;

                // Add user message with correction placeholder
                this.playSendSound();
                const corrMsgId = this.addUserMessageWithCorrection(userMessage);
                this.emilyConversationHistory.push({ role: 'user', content: userMessage });
                input.value = '';
                this.disableEmilyInput();

                // Check if we've reached the message limit
                if (this.emilyMessageCount >= this.MAX_EMILY_MESSAGES) {
                    this.correctFrenchMessage(userMessage).then(c => this.updateMessageCorrection(corrMsgId, c));
                    setTimeout(() => {
                        this.addEmilyMessage("C'était super de discuter avec toi ! À bientôt ! 😊💕", true);
                    }, 1000);
                    return;
                }

                // Correct user's sentence, then ask Emily
                const correction = await this.correctFrenchMessage(userMessage);
                this.updateMessageCorrection(corrMsgId, correction);

                // Show loading
                this.showEmilyLoading(true);

                try {
                    // Build context for Gemini
                    const contextPrompt = `Tu es Emily Cooper de "Emily in Paris". Tu discutes avec ton amie sur WhatsApp de cette scène:

${this.emilyReadingContext.substring(0, 1500)}

RÈGLES STRICTES:
- TRÈS COURT: Maximum 2-3 phrases COURTES (30-40 mots MAX)
- Parle en PREMIÈRE PERSONNE (je/moi) - TU ES EMILY
- Réagis simplement à ce qu'elle dit
- Langage SIMPLE, style WhatsApp
- TERMINE par question courte et fun

❌ TROP LONG:
"OMG, tu as vu ça ? J'étais tellement stressée pour la réservation, je ne voulais pas gâcher ça ! Heureusement que j'ai pu trouver une solution..."

✅ BON:
"J'étais trop stressée ! Ça t'arrive aussi ?"

Questions: "Et toi ?" "Ça va ?" "Tu aimes ?" "T'as déjà fait ?" "C'est pareil ?"

But: Messages courts WhatsApp, pas des paragraphes !`;


                    // Call Gemini API with automatic key rotation
                    const emilyResponse = await this.callGeminiAPI(contextPrompt, this.emilyConversationHistory);

                    this.emilyConversationHistory.push({ role: 'assistant', content: emilyResponse });
                    this.emilyMessageCount++;

                    this.showEmilyLoading(false);

                    setTimeout(() => {
                        this.playNotificationSound();
                        this.addEmilyMessage(emilyResponse, true);

                        // Check if this was the last dynamic message
                        if (this.emilyMessageCount < this.MAX_EMILY_MESSAGES) {
                            this.enableEmilyInput();
                        } else {
                            // Send goodbye message
                            setTimeout(() => {
                                this.playNotificationSound();
                                this.addEmilyMessage("C'était super de discuter avec toi ! À bientôt ! 😊💕", true);
                            }, 1500);
                        }
                    }, 800);

                } catch (error) {
                    console.error('Error calling Gemini API:', error);
                    this.showEmilyLoading(false);
                    this.addEmilyMessage("Désolée, j'ai un problème de connexion... 😅 Réessaye ?", true);
                    this.enableEmilyInput();
                }

            // Sound effects for Emily chat
            playNotificationSound() {
                // WhatsApp-like notification sound using Web Audio API
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                // WhatsApp notification is typically two quick beeps
                oscillator.frequency.value = 600;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);

                // Second beep
                setTimeout(() => {
                    const osc2 = audioContext.createOscillator();
                    const gain2 = audioContext.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioContext.destination);
                    osc2.frequency.value = 800;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    osc2.start(audioContext.currentTime);
                    osc2.stop(audioContext.currentTime + 0.1);
                }, 100);
            },

            playSendSound() {
                // Soft "whoosh" sound for sending messages
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.15);
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.15);
            },
